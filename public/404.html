<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA fallback
    // Сохраняем путь в sessionStorage и редиректим на index.html
    var l = window.location;
    sessionStorage.setItem('redirect', l.pathname + l.search + l.hash);
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 2).join('/') + '/?p=1');
  </script>
</head>
<body></body>
</html>
